<!DOCTYPE html>
<html lang="pt-BR" xmls:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@(/css/style.css)">
    <title>Catálogo de Filmes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <header class="bg-dark text-white p-4">
        <div class="container">
            <h1>Catálogo de Filmes</h1>
            <input type="text" name="campoBusca" id="campoBusca" class="form-control mt-3">
        </div>
    </header>

    <main class="container mt-5">
        <div id="listaFilmes" class="row g-4">

            <div class="col-md-4" th:each="filme : ${filmes}">
                <div class="card card-filme h-100">

                    <img th:src="${filme.imagem}" class="card-img-top">

                    <div class="card-body">

                        <h3 th:text="${filme.titulo}"></h3>

                        <p th:text="${filme.descricao}"></p>

                        <button class="btn btn-dark" th:onclick="'verDetalhes(\'' + ${filme.titulo} + '\')'">

                            Ver detalhes

                        </button>

                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script th:src="@(script/script.js)"></script>
</body>

</html>
